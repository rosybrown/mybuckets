name: Auto Update Manifests

on:
  schedule:
    # 每天 UTC 0:00 运行 (北京时间 8:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  autoupdate:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Scoop
        run: |
          iex "& {$(irm get.scoop.sh)} -RunAsAdmin"
          echo "$env:USERPROFILE\scoop\shims" >> $env:GITHUB_PATH

      - name: Check and update manifests
        shell: powershell
        run: |
          $checkver = "$env:USERPROFILE\scoop\apps\scoop\current\bin\checkver.ps1"
          & $checkver -Dir bucket -Update

      - name: Commit and push changes
        shell: powershell
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          $changed = git status --porcelain bucket/*.json
          if ($changed) {
            git add bucket/*.json
            git commit -m "auto: Update manifests [skip ci]"
            git push
            Write-Host "Changes pushed successfully"
          } else {
            Write-Host "No updates found"
          }
